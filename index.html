<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OLPASA · SGC ISO 9001:2015</title>
<meta name='description' content='Sistema de Gestión de Calidad ISO 9001:2015 — OLPASA'>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{
  --navy:#0f2744;--blue:#1a4a8a;--blue-l:#eaf1fb;
  --accent:#e8a020;--gold:#f5c842;
  --green:#16a34a;--green-l:#dcfce7;
  --amber:#d97706;--amber-l:#fef3c7;
  --red:#dc2626;--red-l:#fee2e2;
  --grey:#f0f4fa;--border:#dde3ee;
  --text:#0f2744;--muted:#6b7a99;--white:#fff;
  --shadow:0 2px 16px rgba(15,39,68,.10);
  --r:12px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:15px;scroll-behavior:smooth}
body{font-family:'DM Sans',sans-serif;background:var(--grey);color:var(--text);min-height:100vh;overflow:hidden}

/* ── SCREENS ── */
.screen{display:none;width:100%;height:100vh}
.screen.active{display:flex;flex-direction:column}

/* ══ LOGIN ══════════════════════════════════════════════════ */
#loginScreen{background:linear-gradient(135deg,var(--navy) 0%,var(--blue) 100%);align-items:center;justify-content:center}
.login-card{background:#fff;border-radius:20px;padding:48px 40px;width:420px;box-shadow:0 24px 60px rgba(0,0,0,.3);text-align:center}
.login-logo{width:64px;height:64px;background:var(--accent);border-radius:16px;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;font-size:28px;font-weight:900;color:var(--navy);font-family:'DM Serif Display'}
.login-card h1{font-family:'DM Serif Display';font-size:26px;color:var(--navy);margin-bottom:6px}
.login-card p{color:var(--muted);font-size:13px;margin-bottom:32px}
.user-btn{width:100%;padding:12px 20px;border-radius:10px;border:2px solid var(--border);background:var(--grey);cursor:pointer;font-size:14px;font-weight:600;color:var(--navy);text-align:left;transition:.15s;margin-bottom:8px;font-family:'DM Sans'}
.user-btn:hover{background:var(--navy);color:#fff;border-color:var(--navy)}

/* ══ APP ════════════════════════════════════════════════════ */
#appScreen{flex-direction:column}

/* TOPBAR */
.topbar{background:var(--navy);color:#fff;display:flex;align-items:center;height:56px;padding:0 20px;flex-shrink:0;box-shadow:0 2px 12px rgba(0,0,0,.3);gap:4px;z-index:100}
.topbar-brand{display:flex;align-items:center;gap:10px;margin-right:24px}
.tb-logo{width:32px;height:32px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:900;color:var(--navy);font-size:16px;font-family:'DM Serif Display'}
.tb-name{font-family:'DM Serif Display';font-size:16px;line-height:1.2}
.tb-sub{font-size:10px;color:#8aafd4}
.nav-btn{padding:6px 14px;border-radius:8px;border:none;background:transparent;color:#8aafd4;cursor:pointer;font-size:13px;font-weight:600;font-family:'DM Sans';transition:.15s}
.nav-btn:hover{color:#fff;background:rgba(255,255,255,.1)}
.nav-btn.active{background:rgba(255,255,255,.15);color:#fff}
.tb-spacer{flex:1}
.stat-pill{display:flex;align-items:center;gap:5px;background:rgba(255,255,255,.1);border-radius:20px;padding:3px 10px;font-size:12px}
.stat-dot{width:8px;height:8px;border-radius:50%}
.score-badge{background:var(--accent);color:var(--navy);border-radius:20px;padding:3px 12px;font-weight:800;font-size:13px}
.tb-user{font-size:11px;color:#8aafd4;padding-left:10px;border-left:1px solid rgba(255,255,255,.2);white-space:nowrap}

/* BODY */
.app-body{display:flex;flex:1;overflow:hidden}

/* SIDEBAR */
.sidebar{width:252px;background:var(--white);border-right:1px solid var(--border);overflow-y:auto;flex-shrink:0}
.sidebar::-webkit-scrollbar{width:4px}
.sidebar::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
.sb-cap{padding:7px 16px;font-size:10px;font-weight:700;letter-spacing:1px;color:#fff;text-transform:uppercase;background:var(--blue);cursor:pointer;display:flex;justify-content:space-between;align-items:center;user-select:none}
.sb-cap:hover{background:#2055a0}
.sb-item{display:flex;align-items:center;gap:8px;padding:8px 16px;cursor:pointer;border-left:3px solid transparent;transition:.12s}
.sb-item:hover{background:var(--grey);border-left-color:var(--border)}
.sb-item.active{background:var(--blue-l);border-left-color:var(--blue)}
.sb-code{font-family:'JetBrains Mono';font-size:11px;font-weight:600;color:var(--muted);min-width:36px}
.sb-item.active .sb-code{color:var(--blue)}
.sb-label{flex:1;font-size:12px;color:#374151;line-height:1.3}
.sb-item.active .sb-label{color:var(--navy);font-weight:600}
.sb-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

/* MAIN */
.main-content{flex:1;overflow-y:auto;padding:24px 28px}
.main-content::-webkit-scrollbar{width:5px}
.main-content::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}

/* CARDS */
.card{background:var(--white);border-radius:var(--r);box-shadow:var(--shadow);border:1px solid var(--border)}
.card-pad{padding:20px 22px}

/* PAGE TITLES */
.page-h1{font-family:'DM Serif Display';font-size:26px;color:var(--navy);margin-bottom:4px}
.page-sub{color:var(--muted);font-size:13px;margin-bottom:24px}

/* KPI */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
.kpi{background:var(--white);border-radius:var(--r);padding:18px 20px;border:1px solid var(--border);box-shadow:var(--shadow)}
.kpi-label{font-size:11px;color:var(--muted);font-weight:600;margin-bottom:8px}
.kpi-val{font-size:32px;font-weight:800;font-family:'JetBrains Mono'}
.kpi-sub{font-size:11px;color:#9ca3af;margin-top:4px}

/* CHARTS ROW */
.charts-row{display:grid;grid-template-columns:1fr 280px;gap:14px;margin-bottom:20px}

/* ALERTS ROW */
.alerts-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:20px}
.alert-item{padding:10px 12px;border-radius:8px;margin-bottom:8px;cursor:pointer;transition:.12s}
.alert-item:hover{opacity:.85}
.alert-c{background:var(--red-l);border-left:3px solid var(--red)}
.alert-h{background:var(--amber-l);border-left:3px solid var(--amber)}
.alert-title{font-size:12px;font-weight:700}
.alert-body{font-size:11px;margin-top:2px}

/* STATUS BADGES */
.badge{display:inline-flex;align-items:center;gap:4px;border-radius:20px;padding:3px 10px;font-size:11px;font-weight:700;white-space:nowrap}
.badge-C{background:var(--green-l);color:var(--green)}
.badge-P{background:var(--amber-l);color:var(--amber)}
.badge-N{background:var(--red-l);color:var(--red)}
.badge-risk-muy{background:#fee2e2;color:#7f1d1d}
.badge-risk-alto{background:#ffedd5;color:#9a3412}
.badge-risk-medio{background:var(--amber-l);color:#78350f}
.badge-risk-bajo{background:var(--green-l);color:#14532d}

/* ── CLAUSULA VIEW ── */
.cl-header{display:flex;align-items:flex-start;gap:16px;margin-bottom:16px}
.cl-grid{display:grid;grid-template-columns:1fr 360px;gap:16px}
.cl-left{display:flex;flex-direction:column;gap:14px}
.cl-right{position:sticky;top:0;height:calc(100vh - 140px);display:flex;flex-direction:column}

.status-selector{display:flex;gap:10px;margin-bottom:14px}
.ss-btn{flex:1;padding:10px 8px;border-radius:10px;border:2px solid var(--border);background:var(--grey);cursor:pointer;font-size:13px;font-weight:700;text-align:center;transition:.15s;font-family:'DM Sans'}
.ss-btn:hover{border-color:var(--blue)}
.ss-btn.sel-C{background:var(--green-l);border-color:var(--green);color:var(--green)}
.ss-btn.sel-P{background:var(--amber-l);border-color:var(--amber);color:var(--amber)}
.ss-btn.sel-N{background:var(--red-l);border-color:var(--red);color:var(--red)}

.section-label{font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);padding-bottom:8px;border-bottom:1px solid var(--grey);margin-bottom:10px}
.breach-item{display:flex;gap:8px;padding:7px 0;border-bottom:1px solid var(--grey);font-size:13px;line-height:1.5}
.breach-num{color:var(--red);font-weight:700;flex-shrink:0}
.doc-chip{background:var(--blue-l);border-radius:6px;padding:4px 10px;font-family:'JetBrains Mono';font-size:11px;color:var(--blue);font-weight:600;display:inline-block;margin:3px 3px 3px 0}
.upload-zone{border:2px dashed var(--border);border-radius:8px;padding:12px;text-align:center;cursor:pointer;font-size:12px;color:var(--muted);transition:.15s;display:block}
.upload-zone:hover{border-color:var(--blue);background:var(--blue-l);color:var(--blue)}
.file-item{display:flex;align-items:center;gap:8px;padding:5px 10px;background:var(--grey);border-radius:6px;font-size:11px;margin-bottom:4px}
.file-del{cursor:pointer;color:var(--red);margin-left:auto;font-size:14px;background:none;border:none}
.notes-area{width:100%;min-height:90px;padding:10px 12px;border:1px solid var(--border);border-radius:8px;font-size:13px;font-family:'DM Sans';resize:vertical;color:var(--text);background:var(--grey)}
.notes-area:focus{outline:none;border-color:var(--blue);background:#fff}
.save-btn{width:100%;padding:12px;background:var(--navy);color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;font-family:'DM Sans';transition:.15s;margin-top:4px}
.save-btn:hover{background:var(--blue)}

/* AI CHAT */
.ai-panel{background:var(--white);border-radius:var(--r);border:1px solid var(--border);box-shadow:var(--shadow);display:flex;flex-direction:column;overflow:hidden;height:100%}
.ai-header{padding:14px 16px;border-bottom:1px solid var(--border);flex-shrink:0}
.ai-messages{flex:1;overflow-y:auto;padding:14px 14px;display:flex;flex-direction:column;gap:10px}
.ai-messages::-webkit-scrollbar{width:3px}
.ai-messages::-webkit-scrollbar-thumb{background:var(--border)}
.ai-msg{max-width:85%;padding:10px 12px;border-radius:12px;font-size:12px;line-height:1.6;white-space:pre-wrap;word-break:break-word}
.ai-msg.user{background:var(--navy);color:#fff;align-self:flex-end;border-radius:12px 12px 4px 12px}
.ai-msg.assistant{background:var(--grey);color:var(--navy);align-self:flex-start;border-radius:12px 12px 12px 4px}
.ai-empty{color:#9ca3af;font-size:12px;text-align:center;padding:20px 0}
.ai-input-row{padding:10px 12px;border-top:1px solid var(--border);display:flex;gap:8px;flex-shrink:0}
.ai-input{flex:1;padding:8px 12px;border:1px solid var(--border);border-radius:8px;font-size:12px;font-family:'DM Sans';outline:none}
.ai-input:focus{border-color:var(--blue)}
.ai-send{padding:8px 14px;background:var(--accent);border:none;border-radius:8px;cursor:pointer;font-size:16px;font-weight:700;transition:.15s}
.ai-send:hover{opacity:.85}
.ai-send:disabled{opacity:.4;cursor:not-allowed}
.typing-dots{display:inline-flex;gap:4px;padding:10px 14px}
.typing-dots span{width:6px;height:6px;border-radius:50%;background:var(--muted);animation:bounce .8s infinite}
.typing-dots span:nth-child(2){animation-delay:.15s}
.typing-dots span:nth-child(3){animation-delay:.3s}
@keyframes bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-6px)}}

/* ── PLAN DE ACCIÓN ── */
.plan-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px}
.plan-kpi{background:var(--white);border-radius:10px;padding:14px 18px;border:1px solid var(--border);box-shadow:var(--shadow)}
.plan-kpi label{font-size:11px;color:var(--muted);font-weight:600;display:block;margin-bottom:4px}
.plan-kpi span{font-size:28px;font-weight:800;font-family:'JetBrains Mono'}
.filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.filter-btn{padding:5px 14px;border-radius:20px;border:1px solid var(--border);background:var(--white);font-size:12px;font-weight:600;cursor:pointer;font-family:'DM Sans';transition:.15s}
.filter-btn:hover{border-color:var(--navy)}
.filter-btn.active{background:var(--navy);color:#fff;border-color:var(--navy)}
.task-card{background:var(--white);border-radius:12px;padding:16px 18px;border:1px solid var(--border);box-shadow:var(--shadow);margin-bottom:10px;display:flex;align-items:flex-start;gap:14px}
.task-prio-bar{width:4px;border-radius:4px;align-self:stretch;flex-shrink:0}
.task-body{flex:1}
.task-title{font-size:14px;font-weight:700;color:var(--navy);margin-bottom:5px}
.task-meta{font-size:11px;color:#9ca3af;display:flex;gap:14px;flex-wrap:wrap}
.task-actions{display:flex;gap:8px;align-items:center;flex-shrink:0}
.task-estado-sel{padding:5px 10px;border:1px solid var(--border);border-radius:8px;font-size:12px;font-family:'DM Sans';font-weight:600;cursor:pointer}
.task-del{background:none;border:none;color:var(--red);cursor:pointer;font-size:16px;padding:4px}
.add-task-btn{position:fixed;bottom:28px;right:28px;width:52px;height:52px;border-radius:50%;background:var(--navy);color:#fff;border:none;font-size:26px;cursor:pointer;box-shadow:0 4px 20px rgba(15,39,68,.4);display:flex;align-items:center;justify-content:center;transition:.15s;z-index:50}
.add-task-btn:hover{background:var(--blue);transform:scale(1.05)}

/* ── MATRIZ ── */
.matriz-table{width:100%;border-collapse:collapse}
.matriz-table th{padding:10px 14px;text-align:left;font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.5px;text-transform:uppercase;border-bottom:1px solid var(--border);background:var(--grey)}
.matriz-table td{padding:10px 14px;border-bottom:1px solid #f3f4f6;font-size:13px;cursor:pointer;transition:.1s}
.matriz-table tr:hover td{background:var(--blue-l)}
.cap-row td{background:var(--navy);color:#fff;font-weight:700;font-size:13px;cursor:default}
.cap-row:hover td{background:var(--navy)!important}

/* ── MODAL ── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:999;align-items:center;justify-content:center}
.modal-overlay.show{display:flex}
.modal{background:#fff;border-radius:16px;padding:32px;width:520px;max-height:90vh;overflow-y:auto;box-shadow:0 24px 60px rgba(0,0,0,.3)}
.modal h2{font-family:'DM Serif Display';font-size:20px;color:var(--navy);margin-bottom:20px}
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:12px;font-weight:700;color:#374151;margin-bottom:4px}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:8px;font-size:13px;font-family:'DM Sans';outline:none;transition:.15s}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--blue)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.modal-btns{display:flex;gap:10px;margin-top:20px}
.btn-primary{flex:1;padding:11px;background:var(--navy);color:#fff;border:none;border-radius:10px;font-weight:700;font-size:14px;cursor:pointer;font-family:'DM Sans'}
.btn-secondary{flex:1;padding:11px;background:var(--grey);color:#374151;border:none;border-radius:10px;font-weight:700;font-size:14px;cursor:pointer;font-family:'DM Sans'}

/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--navy);color:#fff;padding:12px 22px;border-radius:10px;font-size:13px;font-weight:500;box-shadow:0 8px 24px rgba(0,0,0,.3);z-index:9999;transition:.3s;opacity:0;white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}

/* SPINNER */
.spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* DOC ANALYSIS */
.doc-upload-zone{border:2px dashed var(--border);border-radius:10px;padding:18px;text-align:center;cursor:pointer;font-size:13px;color:var(--muted);transition:.2s;display:block;position:relative}
.doc-upload-zone:hover{border-color:var(--blue);background:var(--blue-l);color:var(--blue)}
.doc-upload-zone.dragging{border-color:var(--accent);background:#fff8e6}
.doc-card{background:var(--grey);border:1px solid var(--border);border-radius:10px;padding:14px 16px;margin-top:10px}
.doc-card-header{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.doc-icon{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.doc-card-meta{flex:1;min-width:0}
.doc-card-name{font-family:'JetBrains Mono';font-size:12px;font-weight:600;color:var(--navy);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.doc-card-info{font-size:11px;color:var(--muted);margin-top:2px}
.doc-replace-btn{font-size:11px;color:var(--blue);background:none;border:1px solid var(--blue);border-radius:6px;padding:3px 8px;cursor:pointer;font-family:'DM Sans';white-space:nowrap}
.doc-replace-btn:hover{background:var(--blue);color:#fff}
.analyze-btn{width:100%;padding:10px;background:linear-gradient(135deg,var(--accent),var(--gold));color:var(--navy);border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;font-family:'DM Sans';display:flex;align-items:center;justify-content:center;gap:8px;transition:.15s;margin-top:8px}
.analyze-btn:hover{opacity:.9;transform:translateY(-1px)}
.analyze-btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
.analysis-result{margin-top:12px;border-radius:10px;overflow:hidden;border:1px solid #bdd4f8}
.analysis-header{background:var(--blue);color:#fff;padding:10px 14px;font-size:12px;font-weight:700;display:flex;align-items:center;gap:8px}
.analysis-body{background:linear-gradient(135deg,#f0f5ff,#e8f0fe);padding:14px;font-size:13px;line-height:1.7;color:var(--navy);white-space:pre-wrap}
.analysis-actions{background:#fff;padding:10px 14px;display:flex;gap:8px;border-top:1px solid var(--border)}
.action-apply{padding:7px 14px;background:var(--green);color:#fff;border:none;border-radius:7px;font-size:12px;font-weight:700;cursor:pointer;font-family:'DM Sans'}
.action-discard{padding:7px 14px;background:var(--grey);color:var(--muted);border:1px solid var(--border);border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;font-family:'DM Sans'}
.analyzing-overlay{background:var(--grey);border-radius:10px;padding:20px;text-align:center;margin-top:10px}
.analyzing-bar{height:4px;background:var(--border);border-radius:4px;margin:10px 0;overflow:hidden}
.analyzing-bar-fill{height:100%;background:linear-gradient(90deg,var(--blue),var(--accent));border-radius:4px;animation:analyzeProgress 3s ease-in-out infinite}
@keyframes analyzeProgress{0%{width:0;margin-left:0}50%{width:60%;margin-left:20%}100%{width:0;margin-left:100%}}

/* EMPTY */
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:360px;color:#9ca3af;text-align:center}
.empty-icon{font-size:48px;opacity:.3;margin-bottom:12px}
</style>
</head>
<body>

<!-- ════════════════ LOGIN ════════════════ -->
<div id="loginScreen" class="screen active">
  <div class="login-card">
    <div class="login-logo">O</div>
    <h1>OLPASA · SGC</h1>
    <p>Sistema de Gestión de Calidad ISO 9001:2015<br>Aceite Crudo de Palma · Padre Abad, Ucayali</p>
    <div id="userBtns"></div>
  </div>
</div>

<!-- ════════════════ APP ════════════════ -->
<div id="appScreen" class="screen">
  <!-- TOPBAR -->
  <div class="topbar">
    <div class="topbar-brand">
      <div class="tb-logo">O</div>
      <div><div class="tb-name">OLPASA · SGC ISO 9001</div><div class="tb-sub">Aceite Crudo de Palma · Padre Abad, Ucayali</div></div>
    </div>
    <button class="nav-btn active" onclick="showView('dashboard')">📊 Dashboard</button>
    <button class="nav-btn" onclick="showView('clausula')">📋 Cláusulas</button>
    <button class="nav-btn" onclick="showView('plan')">✅ Plan de Acción</button>
    <button class="nav-btn" onclick="showView('matriz')">🗂 Matriz</button>
    <div class="tb-spacer"></div>
    <div id="tbStats" style="display:flex;gap:10px;align-items:center;font-size:12px"></div>
    <div class="tb-user" id="tbUser"></div>
  </div>

  <div class="app-body">
    <!-- SIDEBAR -->
    <div class="sidebar" id="sidebar"></div>

    <!-- MAIN -->
    <div class="main-content" id="mainContent">
      <div id="viewDashboard"></div>
      <div id="viewClausula" style="display:none"></div>
      <div id="viewPlan" style="display:none"></div>
      <div id="viewMatriz" style="display:none"></div>
    </div>
  </div>
</div>

// ── Persistent storage ──
async function storageGet(key){
  try{
    if(window.storage) return await window.storage.get(key,true);
    const v=localStorage.getItem(key); return v?{value:v}:null;
  }catch(e){
    try{ const v=localStorage.getItem(key); return v?{value:v}:null; }catch(e2){ return null; }
  }
}
async function storageSet(key,val){
  try{
    if(window.storage){ await window.storage.set(key,val,true); return; }
    localStorage.setItem(key,val);
  }catch(e){
    try{ localStorage.setItem(key,val); }catch(e2){}
  }
}

async function loadData(){
  const cd = await storageGet("olpasa:cdata");
  if(cd) try{ cData = JSON.parse(cd.value); }catch(e){}
  const td = await storageGet("olpasa:tasks");
  if(td) try{ tasks = JSON.parse(td.value); }catch(e){}
}

async function saveCData(){
  await storageSet("olpasa:cdata", JSON.stringify(cData));
}

async function saveTasks(){
  await storageSet("olpasa:tasks", JSON.stringify(tasks));
}

// ── Helpers ──
function getEstado(id){
  return cData[id]?.estado || ALL_ITEMS.find(i=>i.id===id)?.estado || "P";
}

function getCounts(){
  let c=0,p=0,n=0;
  ALL_ITEMS.forEach(i=>{ const e=getEstado(i.id); if(e==="C")c++; else if(e==="P")p++; else n++; });
  return {c,p,n,total:ALL_ITEMS.length};
}

function riskClass(r){ return RIESGO_CLS[r]||"bajo"; }

function showToast(msg){
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"), 2800);
}

function initLogin(){
  const el = document.getElementById("userBtns");
  el.innerHTML = USERS.map(u=>`<button class="user-btn" onclick="login('${u}')">👤 ${u}</button>`).join("");
}

async function login(user){
  currentUser = user;
  await loadData();
  document.getElementById("loginScreen").classList.remove("active");
  document.getElementById("appScreen").classList.add("active");
  document.getElementById("tbUser").textContent = "👤 " + user;
  renderSidebar();
  updateTopStats();
  showView("dashboard");
}

function showView(view){
  currentView = view;
  ["dashboard","clausula","plan","matriz"].forEach(v=>{
    document.getElementById("view"+cap(v)).style.display = v===view?"block":"none";
  });
  document.querySelectorAll(".nav-btn").forEach(b=>{
    b.classList.toggle("active", b.textContent.toLowerCase().includes(view==="clausula"?"cláusula":view==="plan"?"plan":view==="matriz"?"matriz":"dashboard"));
  });
  if(view==="dashboard") renderDashboard();
  else if(view==="clausula"){ if(selectedClausula) renderClausula(selectedClausula); else renderClausulaEmpty(); }
  else if(view==="plan") renderPlan();
  else if(view==="matriz") renderMatriz();
}

function cap(s){ return s.charAt(0).toUpperCase()+s.slice(1); }

function selectClausula(id){
  selectedClausula = id;
  aiMsgs = [];
  renderSidebar();
  showView("clausula");
}

function renderSidebar(){

        <span>Cap.${cap.cap} — ${cap.title}</span><span>${isCol?"▶":"▼"}</span>

// AI CHAT

async function sendAI(id){
  if(aiLoading) return;
  const input = document.getElementById("aiInput");
  const msg = input?.value?.trim();
  if(!msg) return;
  input.value="";
  const item = ALL_ITEMS.find(i=>i.id===id);
  const est = getEstado(id);
  const d = cData[id]||{};
  aiMsgs.push({role:"user",content:msg});
  renderAiMessages();
  aiLoading=true;
  const sendBtn=document.getElementById("aiSend");
  if(sendBtn) sendBtn.disabled=true;
  const systemCtx = "Eres un experto auditor ISO 9001:2015 y asesor de calidad de OLPASA (empresa peruana certificada que produce Aceite Crudo de Palma en Padre Abad, Ucayali). Responde en español, directo y práctico.\n\nCLÁUSULA: "+item.id+" – "+item.title+"\nESTADO: "+ESTADO_CFG[est].label+"\nREQUISITO: "+item.req+"\nBRECHAS: "+item.brechas.join("; ")+"\nNOTAS: "+(d.notas||"ninguna");
  try{
    const res = await fetch("/api/claude",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        model:"claude-sonnet-4-20250514", max_tokens:1000,
        system:systemCtx,
        messages:aiMsgs.map(m=>({role:m.role,content:m.content}))
      })
    });
    if(!res.ok){ const e=await res.json().catch(()=>({})); throw new Error(e?.error?.message||"HTTP "+res.status); }
    const data=await res.json();
    const reply=data.content?.map(c=>c.text||"").join("\n")||"Sin respuesta.";
    aiMsgs.push({role:"assistant",content:reply});
  }catch(e){
    console.error("sendAI:",e);
    aiMsgs.push({role:"assistant",content:"❌ Error: "+(e.message||"No se pudo conectar.")});
  }
  aiLoading=false;
  if(sendBtn) sendBtn.disabled=false;
  renderAiMessages();
}

function renderAiMessages(){
  const box = document.getElementById("aiMessages");
  if(!box) return;
  if(aiMsgs.length===0){
    box.innerHTML='<div class="ai-empty">Pregunta cualquier cosa sobre esta cláusula.</div>';
    return;
  }
  box.innerHTML = aiMsgs.map(m=>`<div class="ai-msg ${m.role}">${escHtml(m.content)}</div>`).join("");
  if(aiLoading) box.innerHTML += '<div class="ai-msg assistant"><div class="typing-dots"><span></span><span></span><span></span></div></div>';
  box.scrollTop = box.scrollHeight;
}

          ${t.clausula?`<span>📋 ${t.clausula}</span>`:""}
          <span>👤 ${t.responsable||"—"}</span>
          <span>📅 ${t.plazo||"Sin plazo"}</span>
          <span>Creado por ${t.creadoPor} · ${t.creadoEn}</span>
        </div>
      </div>
      <div class="task-actions">
        <span style="font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;background:${PRIO_COLORS[t.prioridad]}22;color:${PRIO_COLORS[t.prioridad]}">${t.prioridad}</span>
        <select class="task-estado-sel" style="background:${EST_BG[t.estado]||"#f8faff"};color:${EST_CL[t.estado]||"#374151"}" onchange="updateTaskEstado(${t.id},this.value)">
          ${["Pendiente","En proceso","Completado"].map(s=>`<option${t.estado===s?" selected":""}>${s}</option>`).join("")}
        </select>
        <button class="task-del" onclick="deleteTask(${t.id})">🗑</button>
      </div>
    </div>`).join("");
}

function filterPlan(filter, btn){
  document.querySelectorAll(".filter-btn").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
  document.getElementById("taskList").innerHTML = renderTaskList(filter);
}

async function updateTaskEstado(id, est){
  tasks = tasks.map(t=>t.id===id?{...t,estado:est}:t);
  await saveTasks();
  renderPlan();
  showToast("Estado actualizado: "+est);
}

async function deleteTask(id){
  tasks = tasks.filter(t=>t.id!==id);
  await saveTasks();
  renderPlan();
  showToast("🗑 Tarea eliminada");
}

// MODAL
function openModal(){
  document.getElementById("fResponsable").value = currentUser;
  document.getElementById("taskModal").classList.add("show");
}

function closeModal(){
  document.getElementById("taskModal").classList.remove("show");
  ["fTitulo","fClausula","fDesc"].forEach(id=>{ const el=document.getElementById(id); if(el)el.value=""; });
}

async function addTask(){
  const titulo = document.getElementById("fTitulo").value.trim();
  if(!titulo){ showToast("El título es obligatorio"); return; }
  const task = {
    id:Date.now(),
    titulo,
    clausula:document.getElementById("fClausula").value,
    prioridad:document.getElementById("fPrioridad").value,
    estado:document.getElementById("fEstado").value,
    responsable:document.getElementById("fResponsable").value,
    plazo:document.getElementById("fPlazo").value,
    descripcion:document.getElementById("fDesc").value,
    creadoPor:currentUser,
    creadoEn:new Date().toLocaleDateString("es-PE"),
  };
  tasks.push(task);
  await saveTasks();
  closeModal();
  renderPlan();
  showToast("✅ Tarea añadida al plan de acción");
}

// ══════════════════════════════════════════════════════
// DOCUMENT UPLOAD + AI ANALYSIS
// ══════════════════════════════════════════════════════
async function uploadDoc(id, input){
  const file = input.files[0];
  if(!file) return;
  if(!file.name.toLowerCase().endsWith(".pdf")){ showToast("❌ Solo se aceptan archivos PDF"); return; }
  if(file.size > 4.5*1024*1024){ showToast("❌ Archivo muy grande (máx 4MB)"); return; }
  showToast("⏳ Cargando PDF...");
  let dataUrl = "";
  try { dataUrl = await readFileAsDataURL(file); } catch(e){ showToast("❌ Error leyendo el archivo"); return; }
  const sizeStr = file.size>1024*1024 ? (file.size/1024/1024).toFixed(1)+"MB" : Math.round(file.size/1024)+"KB";
  if(!cData[id]) cData[id]={};
  cData[id].docActual = {
    name: file.name, size: sizeStr,
    date: new Date().toLocaleDateString("es-PE"),
    user: currentUser, dataUrl: dataUrl, isPDF: true
  };
  delete cData[id].aiAnalysis;
  delete cData[id].aiAnalysisDate;
  await saveCData();
  renderClausula(id);
  showToast("✅ PDF guardado — haz clic en '✦ Analizar con IA'");
  input.value="";
}

function readFileAsDataURL(file){
  return new Promise((resolve,reject)=>{
    const r=new FileReader();
    r.onload=e=>resolve(e.target.result);
    r.onerror=()=>reject(new Error("Error leyendo archivo"));
    r.readAsDataURL(file);
  });
}

function readFileAsText(file){
  return new Promise((resolve,reject)=>{
    const r=new FileReader();
    r.onload=e=>resolve(e.target.result);
    r.onerror=()=>reject(new Error(""));
    r.readAsText(file,"UTF-8");
  });
}

function downloadDoc(id){
  const doc=cData[id]?.docActual;
  if(!doc?.dataUrl){ showToast("No hay documento guardado"); return; }
  const a=document.createElement("a");
  a.href=doc.dataUrl; a.download=doc.name;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  showToast("⬇ Descargando "+doc.name);
}

async function analyzeDoc(id){
  const item = ALL_ITEMS.find(i=>i.id===id);
  const d = cData[id];
  if(!d?.docActual?.dataUrl){ showToast("No hay PDF cargado"); return; }
  const btn = document.getElementById("analyzeBtn_"+id);
  const overlay = document.getElementById("analyzingOverlay_"+id);
  if(btn) btn.style.display="none";
  if(overlay) overlay.style.display="block";
  const doc = d.docActual;
  try {
    const base64Data = doc.dataUrl.split(",")[1];
    const body = {
      model:"claude-sonnet-4-20250514",
      max_tokens:1200,
      system:"Eres un auditor líder ISO 9001:2015 evaluando documentos del SGC de OLPASA (empresa certificada que produce Aceite Crudo de Palma en Padre Abad, Ucayali, Perú). Sé directo, técnico y accionable. Responde SIEMPRE en español.",
      messages:[{ role:"user", content:[
        { type:"document", source:{ type:"base64", media_type:"application/pdf", data:base64Data }},
        { type:"text", text:buildAnalysisPrompt(item,doc) }
      ]}]
    };
    const res = await fetch("/api/claude",{
      method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify(body)
    });
    if(!res.ok){ const e=await res.json().catch(()=>({})); throw new Error(e?.error?.message||"HTTP "+res.status); }
    const data = await res.json();
    const analysis = data.content?.map(c=>c.text||"").join("\n")||"Sin respuesta.";
    cData[id].aiAnalysis = analysis;
    cData[id].aiAnalysisDate = new Date().toLocaleDateString("es-PE");
    await saveCData();
    renderClausula(id);
    showToast("✦ Análisis completado");
  } catch(e){
    console.error("analyzeDoc:",e);
    if(overlay) overlay.style.display="none";
    if(btn){ btn.style.display="flex"; btn.innerHTML="✦ Reintentar análisis"; }
    showToast("❌ "+(e.message||"Error en el análisis"));
  }
}

function buildAnalysisPrompt(item, doc){
  return `Analiza este documento en el contexto de la cláusula ${item.id} – "${item.title}" de ISO 9001:2015 para OLPASA.

REQUISITO ISO 9001: ${item.req}

BRECHAS IDENTIFICADAS PREVIAMENTE:
${item.brechas.map((b,i)=>`${i+1}. ${b}`).join("\n")}

NOMBRE DEL DOCUMENTO SUBIDO: ${doc.name}

Por favor responde con esta estructura exacta:

📋 EVALUACIÓN DEL DOCUMENTO
[2-3 oraciones describiendo qué es el documento y si es el adecuado para esta cláusula]

✅ EVIDENCIAS QUE CUMPLE
[Lista con viñetas de lo que el documento demuestra que cumple del requisito ISO 9001]

⚠️ BRECHAS QUE PERSISTEN
[Lista con viñetas de brechas que este documento NO cubre o cubre parcialmente]

🔄 CAMBIO DE ESTADO SUGERIDO
[Elige UNA opción con justificación breve:]
• ✔ CUMPLE — [razón concreta]
• ⚠ CUMPLE PARCIALMENTE — [razón concreta]
• ✘ SIGUE SIENDO BRECHA — [razón concreta]

💡 ACCIÓN INMEDIATA ANTES DE LA AUDITORÍA
[La acción más importante, en 1-2 oraciones concretas]`;
}
